<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard YouTube · LocExpress Franchising</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Inter", "Segoe UI", sans-serif; background: #f0f2f6; color: #374151; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .wrap { text-align: center; padding: 4rem 2rem; max-width: 560px; }
  .icon { font-size: 4rem; }
  h1 { color: #2d3192; font-size: 1.6rem; font-weight: 900; margin: 0.8rem 0 0.4rem; }
  h1 span { color: #f47920; }
  p { color: #6b7280; font-size: 0.95rem; line-height: 1.6; }
  .badge { display: inline-block; margin-top: 1.2rem; background: rgba(244,121,32,0.12); color: #f47920; border: 1px solid rgba(244,121,32,0.3); border-radius: 20px; padding: 6px 16px; font-size: 0.8rem; font-weight: 700; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="icon">▶️</div>
    <h1>Dashboard <span>YouTube</span></h1>
    <p>Em breve — este painel receberá os indicadores do canal do YouTube
       (inscritos, visualizações, tempo de exibição e engajamento), via Windsor.ai.</p>
    <div class="badge">EM CONSTRUÇÃO</div>
  </div>
</body>
</html>
